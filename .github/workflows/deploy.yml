name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  migrate:
    name: Run Drizzle migrations
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: webapp/package-lock.json
      - name: Install
        working-directory: webapp
        run: npm ci
      # Drizzle's migrate command uses DATABASE_URL to apply 0001...0004 in
      # order. Runs against production BEFORE Vercel promotes the deploy so
      # new code never reads a schema that hasn't been migrated yet.
      - name: Apply migrations
        working-directory: webapp
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL_PRODUCTION }}
        run: npm run db:migrate

  deploy:
    name: Trigger Vercel deploy
    runs-on: ubuntu-latest
    needs: migrate
    steps:
      - uses: actions/checkout@v4
      - name: Install Vercel CLI
        run: npm i -g vercel@latest
      - name: Pull environment
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
      - name: Build
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
      - name: Deploy
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
